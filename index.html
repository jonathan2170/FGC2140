  <style>
    /* ============================
       DESIGN TOKENS — DARK (default)
       ============================ */
    :root {
      /* Background */
      --bg-base: #06080F;
      --bg-primary: #0A0E1A;
      --bg-surface: #111726;
      --bg-elevated: #1A2235;
      --bg-elevated-hi: #232E47;

      /* Borders */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.10);
      --border-strong: rgba(255, 255, 255, 0.16);

      /* Text */
      --text-primary: #F5F7FA;
      --text-secondary: #94A1B5;
      --text-tertiary: #5C6A82;
      --text-muted: #3F4A5E;

      /* Brand (from logo) */
      --mint: #5DD3C8;
      --mint-soft: rgba(93, 211, 200, 0.12);
      --gold: #D4A75C;
      --gold-soft: rgba(212, 167, 92, 0.12);

      /* Status */
      --profit: #00D26A;
      --profit-soft: rgba(0, 210, 106, 0.14);
      --loss: #FF5566;
      --loss-soft: rgba(255, 85, 102, 0.14);

      /* Body glow gradients (theme-aware) */
      --glow-mint: rgba(93, 211, 200, 0.08);
      --glow-gold: rgba(212, 167, 92, 0.06);
      --bg-grad-from: #0A0E1A;
      --bg-grad-to: #06080F;
      --noise-blend: overlay;
      --noise-opacity: 0.025;

      /* Brand button text (gradient buttons) */
      --on-mint: #032420;

      /* Effects */
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;

      --shadow-glow: 0 0 40px rgba(93, 211, 200, 0.08);

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);

      color-scheme: dark;
    }

    /* ============================
       LIGHT THEME
       Applies when:
       (a) iPhone is in Light Appearance AND user hasn't forced dark
       (b) user explicitly picks Light via toggle (data-theme="light")
       ============================ */
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg-base: #F4F6FB;
        --bg-primary: #FFFFFF;
        --bg-surface: #FFFFFF;
        --bg-elevated: #F4F6FB;
        --bg-elevated-hi: #E9EDF5;

        --border-subtle: rgba(15, 23, 42, 0.06);
        --border: rgba(15, 23, 42, 0.10);
        --border-strong: rgba(15, 23, 42, 0.18);

        --text-primary: #0F172A;
        --text-secondary: #475569;
        --text-tertiary: #64748B;
        --text-muted: #94A3B8;

        --mint: #0F9E92;             /* darker mint for legibility on white */
        --mint-soft: rgba(15, 158, 146, 0.10);
        --gold: #B07B26;             /* darker gold for legibility */
        --gold-soft: rgba(176, 123, 38, 0.10);

        --profit: #0E9F4A;
        --profit-soft: rgba(14, 159, 74, 0.12);
        --loss: #DC2626;
        --loss-soft: rgba(220, 38, 38, 0.10);

        --glow-mint: rgba(15, 158, 146, 0.06);
        --glow-gold: rgba(176, 123, 38, 0.05);
        --bg-grad-from: #F4F6FB;
        --bg-grad-to: #E9EDF5;
        --noise-blend: multiply;
        --noise-opacity: 0.015;

        --on-mint: #FFFFFF;

        --shadow-glow: 0 0 40px rgba(15, 158, 146, 0.08);

        color-scheme: light;
      }
    }

    /* User explicit override → light */
    :root[data-theme="light"] {
      --bg-base: #F4F6FB;
      --bg-primary: #FFFFFF;
      --bg-surface: #FFFFFF;
      --bg-elevated: #F4F6FB;
      --bg-elevated-hi: #E9EDF5;
      --border-subtle: rgba(15, 23, 42, 0.06);
      --border: rgba(15, 23, 42, 0.10);
      --border-strong: rgba(15, 23, 42, 0.18);
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-tertiary: #64748B;
      --text-muted: #94A3B8;
      --mint: #0F9E92;
      --mint-soft: rgba(15, 158, 146, 0.10);
      --gold: #B07B26;
      --gold-soft: rgba(176, 123, 38, 0.10);
      --profit: #0E9F4A;
      --profit-soft: rgba(14, 159, 74, 0.12);
      --loss: #DC2626;
      --loss-soft: rgba(220, 38, 38, 0.10);
      --glow-mint: rgba(15, 158, 146, 0.06);
      --glow-gold: rgba(176, 123, 38, 0.05);
      --bg-grad-from: #F4F6FB;
      --bg-grad-to: #E9EDF5;
      --noise-blend: multiply;
      --noise-opacity: 0.015;
      --on-mint: #FFFFFF;
      --shadow-glow: 0 0 40px rgba(15, 158, 146, 0.08);
      color-scheme: light;
    }

    /* User explicit override → dark wins even when system is light */
    :root[data-theme="dark"] { color-scheme: dark; }

    * , *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-family: 'Onest', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: 'tnum' 1, 'cv11' 1;
      overscroll-behavior-y: contain;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(1200px 600px at 10% -10%, var(--glow-mint), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, var(--glow-gold), transparent 60%),
        linear-gradient(180deg, var(--bg-grad-from) 0%, var(--bg-grad-to) 100%);
      background-attachment: fixed;
    }

    /* Subtle noise texture (theme-aware) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: var(--noise-opacity);
      mix-blend-mode: var(--noise-blend);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.7'/></svg>");
      z-index: 0;
    }

    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum' 1, 'zero' 1; }

    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    input, select, textarea { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ============================
       LAYOUT
       ============================ */
    #app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: calc(var(--safe-top) + 12px) 0 calc(var(--safe-bot) + 100px);
      min-height: 100vh;
      min-height: 100dvh;
    }

    .container { padding: 0 18px; }

    /* ============================
       TOP BAR
       ============================ */
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 8px 18px 18px;
      gap: 12px;
    }
    .brand {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      min-width: 0;
      flex: 1;
    }
    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: block;
      margin-top: 2px;
    }
    .brand-text {
      min-width: 0;
      flex: 1;
    }
    .brand-name {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .brand-name .zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }
    .brand-name .en {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--mint);
      text-transform: uppercase;
      margin-top: 2px;
    }
    .brand-motto {
      margin-top: 6px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 10.5px;
      line-height: 1.55;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      max-width: 22em;
    }
    .top-actions {
      flex-shrink: 0;
      margin-top: 4px;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      transition: all 0.2s ease;
      color: var(--text-secondary);
    }
    .icon-btn:hover, .icon-btn:active {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-color: var(--border);
    }
    .icon-btn svg { width: 18px; height: 18px; }

    .top-actions { display: flex; gap: 8px; }

    /* ============================
       HERO CARD
       ============================ */
    .hero {
      margin: 0 18px 18px;
      padding: 22px 22px 18px;
      background:
        linear-gradient(165deg, rgba(93, 211, 200, 0.06) 0%, transparent 50%),
        var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(93, 211, 200, 0.18), transparent 70%);
      pointer-events: none;
    }

    .hero-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .hero-label-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-weight: 600;
    }
    .hero-value {
      margin-top: 6px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.05;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease;
    }
    .hero-value:active { opacity: 0.65; }
    .hero-value .currency {
      font-size: 18px;
      color: var(--text-tertiary);
      font-weight: 500;
      margin-right: 4px;
      vertical-align: 4px;
    }
    /* Currency-toggle pill that sits next to the 總資產淨值 label */
    .amt-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px 3px 7px;
      border-radius: 100px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-tertiary);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease, transform 0.15s ease;
      line-height: 1;
    }
    .amt-toggle-btn:active { opacity: 0.6; transform: scale(0.96); }
    .amt-toggle-btn svg { display: block; }
    .amt-toggle-label {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Visual hint that account cards & records are tappable to toggle currency */
    .account-card.amt-toggle,
    .record.amt-toggle { cursor: pointer; }

    .hero-side {
      text-align: right;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      background: var(--profit-soft);
      color: var(--profit);
      font-family: 'JetBrains Mono', monospace;
    }
    .pill.loss { background: var(--loss-soft); color: var(--loss); }
    .pill.neutral { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

    /* Months strip (replaces chart) */
    .months-wrap {
      margin-top: 16px;
      position: relative;
      z-index: 1;
      /* Bleed slightly out of card padding for nicer carousel */
      margin-left: -8px;
      margin-right: -8px;
    }
    .months-empty {
      margin: 0 8px;
      display: grid;
      place-items: center;
      height: 130px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .months-strip {
      display: flex;
      gap: 6px;
      padding: 0 8px;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-padding-left: 8px;
    }
    .months-strip::-webkit-scrollbar { display: none; }

    .month-card {
      flex: 0 0 calc((100% - 28px) / 3); /* 3 cards visible: (full - 16 padding - 12 gap) / 3 */
      scroll-snap-align: start;
      background: color-mix(in srgb, var(--bg-primary) 55%, transparent);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 9px 8px 8px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .month-card.is-latest {
      border-color: color-mix(in srgb, var(--mint) 30%, transparent);
      background: linear-gradient(160deg, color-mix(in srgb, var(--mint) 6%, transparent), color-mix(in srgb, var(--bg-primary) 55%, transparent));
    }
    .month-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      padding-bottom: 6px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border-subtle);
      letter-spacing: -0.02em;
    }
    .month-card.is-latest .month-name { color: var(--mint); }

    .month-metric { margin-bottom: 5px; }
    .month-metric:last-child { margin-bottom: 0; }
    .month-metric .k {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 9.5px;
      color: var(--text-tertiary);
      font-weight: 600;
      letter-spacing: 0.02em;
      display: block;
      line-height: 1.3;
    }
    .month-metric .v-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-top: 1px;
    }
    .month-metric .v {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .month-metric .v.pos { color: var(--profit); }
    .month-metric .v.neg { color: var(--loss); }

    .arrow-icon {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
    }
    .arrow-icon.up { color: var(--profit); }
    .arrow-icon.down { color: var(--loss); }
    .arrow-flat {
      display: inline-block;
      width: 6px;
      height: 1.5px;
      background: var(--text-muted);
      border-radius: 1px;
      flex-shrink: 0;
    }

    .hero-foot {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--border-subtle);
      position: relative;
      z-index: 1;
    }
    .hero-foot .item {
      font-size: 12px;
      color: var(--text-tertiary);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .hero-foot .item .v {
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }
    .hero-foot .divider { width: 1px; height: 24px; background: var(--border-subtle); }

    /* ============================
       ACCOUNT CARDS
       ============================ */
    .account-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0 18px 12px;
    }
    .account-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 16px 14px;
      position: relative;
      overflow: hidden;
    }
    .account-card.trading { border-color: rgba(93, 211, 200, 0.18); }
    .account-card.funding { border-color: rgba(212, 167, 92, 0.18); }
    .account-card .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      margin-bottom: 10px;
    }
    .account-card.trading .badge { background: var(--mint-soft); color: var(--mint); }
    .account-card.funding .badge { background: var(--gold-soft); color: var(--gold); }
    .account-card .name {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .account-card .value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-family: 'JetBrains Mono', monospace;
    }
    .account-card .value .currency {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-right: 2px;
      vertical-align: 2px;
    }
    .account-card .sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: 'Noto Sans TC', sans-serif;
    }
    .account-card .sub-flow {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
    }
    .account-card .sub-flow .sub-arrow {
      color: var(--text-muted);
      font-weight: 600;
    }
    .account-card .sub-flow .sub-to {
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* ============================
       APR SUMMARY CARD
       ============================ */
    .apr-card {
      margin: 0 18px 18px;
      padding: 18px 20px;
      background:
        linear-gradient(135deg, rgba(212, 167, 92, 0.08) 0%, transparent 60%),
        var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .apr-card .left { display: flex; flex-direction: column; gap: 4px; }
    .apr-card .label-row { display: flex; align-items: center; gap: 8px; }
    .apr-card .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .apr-card .desc {
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: 'Noto Sans TC', sans-serif;
    }
    .apr-card .val {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    /* ============================
       SECTION
       ============================ */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 12px;
    }
    .section-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .section-title .count {
      margin-left: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }
    .text-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--mint);
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.15s ease;
    }
    .text-btn:active { background: var(--mint-soft); }

    /* ============================
       RECORDS LIST
       ============================ */
    .records {
      margin: 0 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .record {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .record:active { background: var(--bg-elevated); border-color: var(--border); }
    .record-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .record-month {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      padding-top: 4px; /* visually centered with the larger rebate's cap-height */
    }
    .record-rebate-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      min-width: 0;
    }
    .record-rebate {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--profit);
      line-height: 1.05;
    }
    .record-rebate.neg { color: var(--loss); }
    .record-rebate-twd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .record-rebate-note {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--mint);
      background: var(--mint-soft);
      padding: 3px 9px;
      border-radius: 100px;
      line-height: 1.4;
      white-space: nowrap;
      margin-left: auto;        /* pushes the pill to the right edge */
      align-self: flex-end;     /* aligns with bottom of the value text in meta-items */
    }
    .record-meta {
      margin-top: 10px;
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .meta-item .k {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-weight: 600;
    }
    .meta-item .v {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .meta-item .v.pos { color: var(--profit); }
    .meta-item .v.neg { color: var(--loss); }

    /* Empty state */
    .empty {
      margin: 0 18px;
      padding: 36px 18px;
      background: var(--bg-surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: var(--mint-soft);
      color: var(--mint);
      display: grid;
      place-items: center;
    }
    .empty-icon svg { width: 22px; height: 22px; }
    .empty-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .empty-desc {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ============================
       FOOTER LINKS
       ============================ */
    .footer {
      margin: 28px 18px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-section-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-tertiary);
      text-transform: uppercase;
      padding: 6px 4px 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }
    .footer-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    /* The branded "FGCoin announcement" link gets the warm gradient background */
    .footer-link.brand-fg {
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--mint) 8%, transparent) 0%, color-mix(in srgb, var(--gold) 5%, transparent) 100%),
        var(--bg-surface);
    }
    .footer-link.brand-fg::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, color-mix(in srgb, var(--mint) 16%, transparent), transparent 70%);
      pointer-events: none;
    }
    .footer-link:active {
      transform: scale(0.985);
      background: var(--bg-elevated);
      border-color: var(--border-strong);
    }
    .footer-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
      box-shadow: 0 0 14px color-mix(in srgb, var(--mint) 10%, transparent);
      position: relative;
      z-index: 1;
      background: var(--bg-elevated);
      box-sizing: border-box;
    }
    /* Brand-specific frames — all three keep similar visual weight by sharing
       a thin solid-black outline (instead of the subtle var(--border) used elsewhere). */
    .footer-icon.brand-fg,
    .footer-icon.brand-okx,
    .footer-icon.brand-etherfi {
      border: 1px solid #000;
    }
    .footer-icon.brand-okx { background: #000; }
    .footer-icon.brand-etherfi { background: #000; }
    .footer-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .footer-content { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .footer-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .footer-sub {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11.5px;
      color: var(--text-tertiary);
      margin-top: 3px;
      line-height: 1.45;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
    }
    .footer-bullet {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .footer-bullet::before {
      content: '';
      width: 3px;
      height: 3px;
      border-radius: 100px;
      background: var(--text-muted);
      display: inline-block;
    }
    .footer-bullet:first-child::before { display: none; }
    .footer-arrow {
      width: 18px; height: 18px;
      color: var(--mint);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .footer-bonus {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .footer-bonus.profit { background: var(--profit-soft); color: var(--profit); }
    .footer-bonus.gold { background: var(--gold-soft); color: var(--gold); }
    .footer-bonus.mint { background: var(--mint-soft); color: var(--mint); }

    /* Tiny disclaimer below all links */
    .footer-fineprint {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      padding: 14px 8px 4px;
      letter-spacing: 0.02em;
      line-height: 1.5;
    }
    .footer-fineprint .sep { margin: 0 6px; opacity: 0.6; }

    /* ============================
       FAB
       ============================ */
    .fab {
      position: fixed;
      bottom: calc(20px + var(--safe-bot));
      left: 50%;
      transform: translateX(-50%);
      width: min(calc(100% - 36px), 444px);
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--mint) 0%, color-mix(in srgb, var(--mint) 80%, #000) 100%);
      color: var(--on-mint);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow:
        0 10px 30px color-mix(in srgb, var(--mint) 35%, transparent),
        0 4px 12px rgba(0, 0, 0, 0.20);
      z-index: 50;
      transition: transform 0.12s ease;
    }
    .fab:active { transform: translateX(-50%) scale(0.97); }
    .fab svg { width: 18px; height: 18px; }

    /* ============================
       MODAL / SHEET
       ============================ */
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 100;
    }
    .scrim.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translate(-50%, 100%);
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      max-height: 92dvh;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 28px 28px 0 0;
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0.32, 1);
      z-index: 101;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: var(--safe-bot);
    }
    .sheet.open { transform: translate(-50%, 0); }
    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 100px;
      background: var(--border-strong);
      margin: 10px auto 6px;
      flex-shrink: 0;
    }
    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 22px 16px;
      flex-shrink: 0;
    }
    .sheet-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 100px;
      background: var(--bg-surface);
      display: grid;
      place-items: center;
      color: var(--text-secondary);
    }
    .sheet-body {
      padding: 0 22px 24px;
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    /* ============================
       FORM
       ============================ */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }
    .form-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .form-label .opt {
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 4px;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.15s ease, background 0.15s ease;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--mint);
      background: var(--bg-elevated);
    }
    .form-input::placeholder { color: var(--text-muted); }

    .input-affix-wrap {
      position: relative;
    }
    .input-affix {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      pointer-events: none;
    }
    .input-affix.left { left: 16px; }
    .input-affix.right { right: 16px; }
    .form-input.with-left { padding-left: 32px; }
    .form-input.with-right { padding-right: 36px; }

    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .form-hint {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11px;
      color: var(--text-tertiary);
      line-height: 1.5;
    }

    .preview-card {
      margin-top: 4px;
      padding: 14px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
    }
    .preview-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .preview-row + .preview-row { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-subtle); }
    .preview-row .k {
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text-secondary);
    }
    .preview-row .v {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      color: var(--mint);
    }

    /* Submit */
    .btn-primary {
      width: 100%;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--mint) 0%, color-mix(in srgb, var(--mint) 80%, #000) 100%);
      color: var(--on-mint);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.04em;
      transition: transform 0.12s ease, opacity 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; }

    .btn-ghost {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 600;
      font-size: 14px;
    }
    .btn-ghost:active { background: var(--bg-elevated); }
    .btn-ghost.danger { color: var(--loss); border-color: color-mix(in srgb, var(--loss) 25%, transparent); }

    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }
    .form-actions-row { display: flex; gap: 10px; }
    .form-actions-row > * { flex: 1; }

    /* ============================
       SETTINGS / ONBOARD
       ============================ */
    .onboard-hero {
      padding: 8px 22px 28px;
      text-align: center;
    }
    .onboard-logo {
      width: 108px;
      height: 108px;
      margin: 8px auto 18px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow:
        0 0 60px rgba(93, 211, 200, 0.18),
        0 0 0 6px rgba(93, 211, 200, 0.04),
        0 12px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .onboard-logo::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 28px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .onboard-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .onboard-brand-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.32em;
      color: var(--mint);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .onboard-title {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .onboard-sub {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }

    /* Settings list */
    .list-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.15s ease;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row:active { background: var(--bg-elevated); }
    .list-row .lk {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .list-row .lv {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    .anim-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .anim-in-1 { animation-delay: 0.05s; }
    .anim-in-2 { animation-delay: 0.10s; }
    .anim-in-3 { animation-delay: 0.15s; }
    .anim-in-4 { animation-delay: 0.20s; }

    /* Stat ticker */
    .meta-bar {
      display: flex;
      gap: 8px;
      padding: 0 18px 14px;
      flex-wrap: wrap;
    }
    .meta-chip {
      padding: 7px 12px;
      border-radius: 100px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      font-size: 11px;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text-secondary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .meta-chip .v {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
      font-weight: 600;
    }
    /* Live "running" indicator — small green dot with a gently pulsing ring */
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--profit);
      margin-right: -1px;       /* the chip's gap:6px already provides spacing */
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--profit) 55%, transparent);
      animation: status-pulse 2.2s ease-out infinite;
    }
    @keyframes status-pulse {
      0% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--profit) 55%, transparent);
      }
      70% {
        box-shadow: 0 0 0 7px color-mix(in srgb, var(--profit) 0%, transparent);
      }
      100% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--profit) 0%, transparent);
      }
    }
    /* Respect users who prefer reduced motion — a subtle steady glow instead */
    @media (prefers-reduced-motion: reduce) {
      .status-dot {
        animation: none;
        box-shadow: 0 0 6px color-mix(in srgb, var(--profit) 60%, transparent);
      }
    }

    /* Overflow safety */
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>

  const THEME_KEY = 'fucheng2140.theme.v1';   // 'auto' | 'light' | 'dark'

  // Admin can "publish" the current state by downloading a new HTML where this

  // The string below uses an exact marker the publisher script searches for.
  /* PUBLISHED_STATE_BEGIN */
  const PUBLISHED_STATE = null;
  /* PUBLISHED_STATE_END */

  const DEFAULT_STATE = {
    config: {
      initialPrincipal: null,   // number | null
      startDate: null,          // 'YYYY-MM-DD' | null
      currency: 'USDT',
      twdRate: 32.5             // USD→TWD exchange rate (admin-editable in settings)

  // ───────── MODE DETECTION ─────────
  // Admin mode is enabled by adding ?admin=1 (or #admin) to the URL.
  // Sticky once entered: the URL query stays; PIN unlock further gates editing.
  const isAdminUrl = () => {
    const u = new URL(location.href);
    return u.searchParams.get('admin') === '1' || u.hash.includes('admin');
  };

  // Viewer mode = anyone who is not in admin URL
  const IS_ADMIN_URL = isAdminUrl();

  // adminAuthed: true if PIN has been verified this session
  let adminAuthed = false;

  // Helper: SHA-256 hex (used to hash the PIN)
  async function sha256Hex(text) {
    const buf = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function loadAdmin() {
    try {
      const raw = localStorage.getItem(ADMIN_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }
  function saveAdmin(obj) {
    try { localStorage.setItem(ADMIN_KEY, JSON.stringify(obj)); } catch {}
  }

    if (!IS_ADMIN_URL) return false;
    return adminAuthed;

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  const fmtMoney = (n, opts = {}) => {
    if (!Number.isFinite(n)) return '—';
    const sign = opts.signed && n > 0 ? '+' : '';
    return sign + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };
  const fmtPct = (n, digits = 2, signed = false) => {
    if (!Number.isFinite(n)) return '—';
    const sign = signed && n > 0 ? '+' : '';
    return sign + n.toFixed(digits) + '%';
  };
  // ─────────────────────────────────────────────────────────
  //  USD → TWD live exchange rate
  //
  //  Strategy:  live (auto-fetched, cached 6 hr) ▸ cached ▸ manual fallback
  //  Sources tried in order; first success wins.
  //    1) Fawaz Ahmed currency-api on jsdelivr (CDN-cached, daily updates)
  //    2) Same data on a Cloudflare Pages mirror
  //    3) open.er-api.com (free, no auth, has TWD)
  //  Each call has a 5-second timeout so a slow API never blocks the page.
  // ─────────────────────────────────────────────────────────
  const FX_CACHE_KEY = 'fucheng2140.fx.v1';
  const FX_TTL_MS = 6 * 3600 * 1000; // 6 hours
  let liveTwdRate = null; // { rate, fetchedAt, source } | null

  function loadCachedFx() {
    try {
      const v = JSON.parse(localStorage.getItem(FX_CACHE_KEY) || 'null');
      if (v && Number.isFinite(v.rate) && v.fetchedAt) return v;
    } catch {}
    return null;
  }
  function saveCachedFx(v) {
    try { localStorage.setItem(FX_CACHE_KEY, JSON.stringify(v)); } catch {}
  }

  async function fetchWithTimeout(url, ms = 5000) {
    const ctrl = new AbortController();
    const id = setTimeout(() => ctrl.abort(), ms);
    try { return await fetch(url, { signal: ctrl.signal, cache: 'default' }); }
    finally { clearTimeout(id); }
  }

  async function fetchTwdRate({ force = false } = {}) {
    if (!force) {
      const cached = loadCachedFx();
      if (cached && Date.now() - cached.fetchedAt < FX_TTL_MS) return cached;
    }
    const sources = [
      { name: 'jsdelivr',     url: 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json', parse: j => j?.usd?.twd },
      { name: 'currency-api', url: 'https://latest.currency-api.pages.dev/v1/currencies/usd.json',                         parse: j => j?.usd?.twd },
      { name: 'open.er-api',  url: 'https://open.er-api.com/v6/latest/USD',                                                parse: j => j?.rates?.TWD },
    ];
    for (const src of sources) {
      try {
        const r = await fetchWithTimeout(src.url, 5000);
        if (!r.ok) continue;
        const j = await r.json();
        const rate = src.parse(j);
        if (Number.isFinite(rate) && rate > 0) {
          const result = { rate, fetchedAt: Date.now(), source: src.name };
          saveCachedFx(result);
          return result;
        }
      } catch { /* try next source */ }
    }
    return null;
  }

  // What rate do we display right now?  Live > cached > manual fallback.
  function getCurrentTwdRate() {
    if (liveTwdRate && Number.isFinite(liveTwdRate.rate)) return liveTwdRate.rate;
    const cached = loadCachedFx();
    if (cached && Number.isFinite(cached.rate)) return cached.rate;
    return Number(state.config.twdRate) || 32.5;
  }
  function getCurrentTwdRateInfo() {
    if (liveTwdRate) return { ...liveTwdRate, kind: 'live' };
    const cached = loadCachedFx();
    if (cached) return { ...cached, kind: 'cached' };
    return { rate: Number(state.config.twdRate) || 32.5, kind: 'manual' };
  }

  // Update all NT$ amounts inline without a full re-render
  function refreshTwdDisplays() {
    document.querySelectorAll('[data-twd]').forEach(el => {
      const usd = parseFloat(el.dataset.twd);

  function formatAge(ts) {
    const ms = Date.now() - ts;
    if (ms < 60000)    return '剛剛';
    if (ms < 3600000)  return Math.floor(ms / 60000) + ' 分鐘前';
    if (ms < 86400000) return Math.floor(ms / 3600000) + ' 小時前';
    return Math.floor(ms / 86400000) + ' 天前';
  }

  // ─────────────────────────────────────────────────────────
  //  Display mode: 'usdt' (default) | 'twd'
  //  User can tap any amount on the dashboard to toggle.
  // ─────────────────────────────────────────────────────────
  const DISPLAY_KEY = 'fucheng2140.display.v1';
  function getDisplayMode() {
    try { return localStorage.getItem(DISPLAY_KEY) === 'twd' ? 'twd' : 'usdt'; }
    catch { return 'usdt'; }
  }
  function setDisplayMode(m) {
    try { localStorage.setItem(DISPLAY_KEY, m); } catch {}
  }
  function toggleDisplayMode() {
    const scrollY = window.scrollY;
    setDisplayMode(getDisplayMode() === 'usdt' ? 'twd' : 'usdt');

  // The currency symbol for current mode
  function currentSymbol() {
    return getDisplayMode() === 'twd' ? 'NT$' : '$';
  }

  // Format a USDT amount in the current display mode.
  // Returns e.g. "$5,000.00", "+$227.00", "-$50.00" or "NT$163,250", "+NT$7,378".
  const fmtAmt = (usd, { signed = false } = {}) => {
    if (!Number.isFinite(usd)) return '—';
    const mode = getDisplayMode();
    if (mode === 'twd') {
      const twd = Math.round(usd * getCurrentTwdRate());
      const abs = Math.abs(twd).toLocaleString('en-US');
      if (signed && twd > 0) return '+NT$' + abs;
      if (twd < 0)           return '-NT$' + abs;
      return 'NT$' + abs;
    }
    // USDT mode
    const abs = Math.abs(usd).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (signed && usd > 0) return '+$' + abs;
    if (usd < 0)           return '-$' + abs;
    return '$' + abs;
  };

  // For rendering the secondary "≈ XXX" subtitle on records: show the OPPOSITE
  // currency from the current mode.
  const fmtAltAmt = (usd, { signed = false } = {}) => {
    if (!Number.isFinite(usd)) return '—';
    const mode = getDisplayMode();
    if (mode === 'twd') {
      // In TWD mode, subtitle shows USDT
      const abs = Math.abs(usd).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (signed && usd > 0) return '+$' + abs;
      if (usd < 0)           return '-$' + abs;
      return '$' + abs;
    }
    // USDT mode → subtitle shows TWD
    const twd = Math.round(usd * getCurrentTwdRate());
    const abs = Math.abs(twd).toLocaleString('en-US');
    if (signed && twd > 0) return '+NT$' + abs;
    if (twd < 0)           return '-NT$' + abs;
    return 'NT$' + abs;
  };

  // USD → NT$ display. Uses live rate if available, falls back to manual.
  // NTD has no fractional unit, so we round to nearest dollar.
  const fmtTwd = (usd) => {
    if (!Number.isFinite(usd)) return '—';
    const twd = Math.round(usd * getCurrentTwdRate());
    return 'NT$' + twd.toLocaleString('en-US');
  };
  const todayISO = () => {
    // Use LOCAL date, not UTC — otherwise users in eastern timezones (e.g. Taiwan)
    // would get yesterday's date when viewing before ~8 AM local time, which makes
    // the days-running calculation (and thus APR) shift by 1 day.
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  const currentYM = () => {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
  };
  const ymPretty = (ym) => {
    if (!ym) return '';
    const [y, m] = ym.split('-');
    return `${y}/${m}`;
  };
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const uid = () => 'r_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);

  // Days between two ISO dates (inclusive of running period)
  const daysBetween = (fromISO, toISO) => {
    const a = new Date(fromISO + 'T00:00:00');
    const b = new Date(toISO + 'T00:00:00');
    return Math.max(1, Math.round((b - a) / 86400000));
  };

  // ---------- State ----------
  // Admin mode: state lives in localStorage and is editable.
  // Viewer mode: state is the PUBLISHED_STATE constant baked into HTML.
  //              localStorage is ignored (viewers never see partial admin data).
  let state = loadState();

  function loadState() {
    // Normalize legacy 'USD' currency values to 'USDT' (the asset is actually USDT)
    const normalizeConfig = (c) => {
      const out = { ...c };
      if (out.currency === 'USD') out.currency = 'USDT';
      return out;
    };

    if (!IS_ADMIN_URL) {
      // VIEWER: read embedded published snapshot. If none, show empty placeholder.
      if (PUBLISHED_STATE && typeof PUBLISHED_STATE === 'object') {
        return {
          config: { ...DEFAULT_STATE.config, ...normalizeConfig(PUBLISHED_STATE.config || {}) },
          records: Array.isArray(PUBLISHED_STATE.records) ? PUBLISHED_STATE.records : []
        };
      }
      return structuredClone(DEFAULT_STATE);
    }
    // ADMIN: read from localStorage
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(DEFAULT_STATE);
      const parsed = JSON.parse(raw);
      return {
        config: { ...DEFAULT_STATE.config, ...normalizeConfig(parsed.config || {}) },
        records: Array.isArray(parsed.records) ? parsed.records : []
      };
    } catch (e) {
      console.warn('State load failed, using default', e);
      return structuredClone(DEFAULT_STATE);
    }
  }

  function saveState() {
    if (!IS_ADMIN_URL) return; // Viewer should never write
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      toast('儲存失敗', true);
    }
  }

  // ---------- Computed ----------
  // Rebate per month = 初始本金 × 返佣率
  function computeRecord(r, principal) {
    const rebateAmount = (Number(principal) || 0) * (Number(r.rebateRate) || 0) / 100;
    return { ...r, rebateAmount };
  }

  function computeTotals() {
    const principal = Number(state.config.initialPrincipal) || 0;
    const records = state.records
      .map(r => computeRecord(r, principal))
      .sort((a, b) => a.ym.localeCompare(b.ym));

    const totalRebate = records.reduce((s, r) => s + r.rebateAmount, 0);
    const totalIncome = records.reduce((s, r) => s + (Number(r.incomeAmount) || 0), 0);

    // 最新月份收益額（依年月排序後的最後一筆）
    const latestIncome = records.length
      ? Number(records[records.length - 1].incomeAmount) || 0
      : 0;

    // 帳戶現值
    const tradingAccount = principal + latestIncome;          // 交易帳戶 = 本金 + 最新月份收益
    const fundingAccount = totalRebate;                       // 資金帳戶 = 累計返佣
    const totalAsset = principal + latestIncome + totalRebate; // 總資產 = 三者合計

    // 累計收益率 = (最新收益 + 累計返佣) ÷ 本金
    const totalReturnPct = principal > 0 ? ((latestIncome + totalRebate) / principal) * 100 : 0;

    let days = 1;
    let apr = 0;
    if (state.config.startDate) {
      days = daysBetween(state.config.startDate, todayISO());
      // APR：(本金 + 最新收益 + 累計返佣) ÷ 本金 · 年化  ≡  總成長率年化
      apr = principal > 0 && days > 0
        ? ((latestIncome + totalRebate) / principal) * (365 / days) * 100
        : 0;
    }

    // Avg monthly return on principal
    const avgMonthlyReturn = records.length
      ? records.reduce((s, r) => s + (Number(r.returnRate) || 0), 0) / records.length
      : 0;
    const avgRebateRate = records.length
      ? records.reduce((s, r) => s + (Number(r.rebateRate) || 0), 0) / records.length
      : 0;

    return {
      principal, records, totalRebate, totalIncome, latestIncome,
      tradingAccount, fundingAccount, totalAsset, totalReturnPct,
      apr, days, avgMonthlyReturn, avgRebateRate
    };
  }

  // ---------- Months strip ----------
  // Renders 3-cards-visible horizontally scrolling strip with month-over-month
  // comparison arrows for 收益率, 返佣%, APR%.
  // APR per-month uses the SAME formula as the main dashboard, applied as of
  // each month's end:
  //   APR(month X) = (income@X + cumulativeRebate@X) / principal × (365 / daysFromStartTo_X) × 100
  function renderMonthsStrip(records) {
    if (!records || records.length === 0) {
      return `<div class="months-empty">尚無資料 · 新增首筆紀錄以顯示月度比較</div>`;
    }

    const principal = Number(state.config.initialPrincipal) || 0;
    const startDate = state.config.startDate;

    // Days from startDate to end of given YYYY-MM, capped at today.
    // Crucially, this uses the SAME daysBetween + todayISO helpers as the main
    // dashboard APR — so for the latest month the day count is identical, which
    // means the last month-card's APR matches the dashboard's APR exactly.
    const daysToEndOf = (ym) => {
      if (!startDate) return 1;
      const [y, m] = ym.split('-').map(Number);
      const lastDay = new Date(y, m, 0).getDate(); // last calendar day of month m
      const monthEndISO = `${y}-${String(m).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
      const todayStr = todayISO();
      const capISO = monthEndISO > todayStr ? todayStr : monthEndISO;
      return daysBetween(startDate, capISO);
    };

    // Pre-compute per-month APR using the dashboard formula, walked forward
    // through records (oldest → newest) so we can accumulate rebates.
    let cumulativeRebate = 0;
    const aprs = records.map(r => {
      const inc = Number(r.incomeAmount) || 0;
      const rebAmt = principal * (Number(r.rebateRate) || 0) / 100;
      cumulativeRebate += rebAmt;
      const days = daysToEndOf(r.ym);
      return principal > 0 && days > 0
        ? ((inc + cumulativeRebate) / principal) * (365 / days) * 100
        : 0;
    });

    // Smart APR formatter: large values get fewer decimals to fit the narrow card
    const fmtApr = (v) => {
      const abs = Math.abs(v);
      if (abs >= 1000) return fmtPct(v, 0, true);
      if (abs >= 100)  return fmtPct(v, 1, true);
      return fmtPct(v, 2, true);
    };

    const cards = records.map((r, i) => {
      const ret = Number(r.returnRate) || 0;
      const reb = Number(r.rebateRate) || 0;
      const apr = aprs[i];
      const isLatest = i === records.length - 1;
      const prev = i > 0 ? records[i - 1] : null;

      const arrowFor = (curr, prevVal) => {
        if (prev === null) return arrowSVG('flat');
        const eps = 0.005;
        if (curr > prevVal + eps) return arrowSVG('up');
        if (curr < prevVal - eps) return arrowSVG('down');
        return arrowSVG('flat');
      };

      let retArrow = arrowSVG('flat');
      let rebArrow = arrowSVG('flat');
      let aprArrow = arrowSVG('flat');
      if (prev) {
        const prevRet = Number(prev.returnRate) || 0;
        const prevReb = Number(prev.rebateRate) || 0;
        const prevApr = aprs[i - 1];
        retArrow = arrowFor(ret, prevRet);
        rebArrow = arrowFor(reb, prevReb);
        aprArrow = arrowFor(apr, prevApr);
      }

      return `
        <div class="month-card${isLatest ? ' is-latest' : ''}">
          <div class="month-name">${ymPretty(r.ym)}</div>
          <div class="month-metric">
            <span class="k">收益率</span>
            <div class="v-row">
              <span class="v ${ret >= 0 ? 'pos' : 'neg'}">${fmtPct(ret, 2, true)}</span>
              ${retArrow}
            </div>
          </div>
          <div class="month-metric">
            <span class="k">返佣%</span>
            <div class="v-row">
              <span class="v">${fmtPct(reb, 2)}</span>
              ${rebArrow}
            </div>
          </div>
          <div class="month-metric">
            <span class="k">APR</span>
            <div class="v-row">
              <span class="v ${apr >= 0 ? 'pos' : 'neg'}">${fmtApr(apr)}</span>
              ${aprArrow}
            </div>
          </div>
        </div>
      `;
    }).join('');

    return `<div class="months-strip" id="monthsStrip">${cards}</div>`;
  }

  function arrowSVG(dir) {
    if (dir === 'up') {
      return `<svg class="arrow-icon up" viewBox="0 0 8 8" aria-label="高於上月"><path d="M4 1 L7.5 6.5 L0.5 6.5 Z" fill="currentColor"/></svg>`;
    }
    if (dir === 'down') {
      return `<svg class="arrow-icon down" viewBox="0 0 8 8" aria-label="低於上月"><path d="M4 7 L0.5 1.5 L7.5 1.5 Z" fill="currentColor"/></svg>`;
    }
    return `<span class="arrow-flat" aria-label="持平"></span>`;
  }

  // ---------- Publish snapshot ----------
  // Fetches the current HTML page, swaps the PUBLISHED_STATE = null sentinel with
  // a JSON literal of the admin's current state, and triggers a download.
  // Admin then re-uploads this HTML to their host. All viewers (without ?admin=1)
  // will see the embedded data on next load.
  async function publishSnapshot() {
    try {
      toast('生成發布版本中…');
      // Fetch this same HTML file
      const res = await fetch(location.pathname, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTML fetch failed');
      let html = await res.text();

      const snapshot = {
        config: state.config,
        records: state.records,
        publishedAt: new Date().toISOString()
      };
      // Replace the marker block with a populated one
      const literal = JSON.stringify(snapshot);
      const replacementBlock =
`/* PUBLISHED_STATE_BEGIN */
  const PUBLISHED_STATE = ${literal};
  /* PUBLISHED_STATE_END */`;

      const re = /\/\* PUBLISHED_STATE_BEGIN \*\/[\s\S]*?\/\* PUBLISHED_STATE_END \*\//;
      if (!re.test(html)) {
        toast('找不到嵌入點，請確認版本', true);
        return;
      }
      html = html.replace(re, replacementBlock);

      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `index.html`;  // ready to upload as-is
      a.click();
      URL.revokeObjectURL(url);
      toast('發布版本已下載 (index.html)');
    } catch (err) {
      console.error(err);
      toast('發布失敗：' + (err.message || ''), true);
    }
  }

  function getThemePref() {

  function applyTheme() {
    const pref = getThemePref();
    const html = document.documentElement;
    if (pref === 'auto') html.removeAttribute('data-theme');
    else html.setAttribute('data-theme', pref);
  }
  function wireThemeBtn() {
    const btn = document.getElementById('btnTheme');
    if (!btn) return;
    const updateIcon = () => {
      const pref = getThemePref();
      // sun for light, moon for dark, half-moon for auto
      let svg;
      if (pref === 'light') {
        svg = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6L4.2 4.2M19.8 19.8l-1.4-1.4M5.6 18.4l-1.4 1.4M19.8 4.2l-1.4 1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
      } else if (pref === 'dark') {
        svg = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
      } else {
        svg = '<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/></svg>';
      }
      btn.innerHTML = svg;
    };
    updateIcon();
    btn.addEventListener('click', () => {
      const cur = getThemePref();
      const next = cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto';
      setThemePref(next);
      applyTheme();
      updateIcon();
      const labels = { auto: '跟隨系統', light: '淺色', dark: '深色' };
      toast('主題：' + labels[next]);

    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' });

        // Periodically poll for SW updates while page is open (every 60s).
        // Cheap because of HTTP 304s when sw.js hasn't changed.
        setInterval(() => reg.update().catch(() => {}), 60 * 1000);
        // Also re-check whenever the page becomes visible again
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update().catch(() => {});
        });

        // When a new SW takes control (e.g. after sw.js change + skipWaiting),
        // reload once to make sure the page reflects the new world.
        let reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloading) return;
          reloading = true;
          setTimeout(() => location.reload(), 80);
        });

        // If a new SW is installed while page is open, ask it to take over.
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              newSW.postMessage('SKIP_WAITING');
            }
          });
        });
      } catch {}
    });
  }

  // Prevent pull-to-refresh weirdness on iOS PWA
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  </script>
</body>
